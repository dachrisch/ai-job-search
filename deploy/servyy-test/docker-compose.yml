services:
  mongodb:
    image: mongo:7.0
    container_name: job-search-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: job-search-redis-app
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: dachrisch/job-search-api:latest
    container_name: job-search-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
      - api.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/job_search
      REDIS_URL: redis://redis:6379
      CRAWLER_SERVICE_URL: http://crawler:8000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.http.routers.job-search-api.rule=Host(`${SERVICE_HOST}`) && PathPrefix(`/api`)
      - traefik.http.routers.job-search-api.entrypoints=web
      - traefik.http.services.job-search-api.loadbalancer.server.port=3000
      - traefik.http.routers.job-search-api_local.rule=Host(`job-search.${LOCAL_HOSTNAME}`) && PathPrefix(`/api`)
      - traefik.http.routers.job-search-api_local.entrypoints=web
      - com.centurylinklabs.watchtower.scope=dev

  frontend:
    image: dachrisch/job-search-frontend:latest
    container_name: job-search-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.http.routers.job-search-frontend.rule=Host(`${SERVICE_HOST}`)
      - traefik.http.routers.job-search-frontend.entrypoints=web
      - traefik.http.services.job-search-frontend.loadbalancer.server.port=80
      - traefik.http.routers.job-search-frontend_local.rule=Host(`job-search.${LOCAL_HOSTNAME}`)
      - traefik.http.routers.job-search-frontend_local.entrypoints=web
      - com.centurylinklabs.watchtower.scope=dev

  crawler:
    image: dachrisch/job-search-crawler:latest
    container_name: job-search-crawler
    restart: unless-stopped
    env_file:
      - crawler.env
    environment:
      API_URL: http://job-search-api:3000
    networks:
      - internal
      - egress
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - com.centurylinklabs.watchtower.scope=dev

volumes:
  mongodb_data:
  redis_data:

networks:
  internal:
  egress:
    external: true
  proxy:
    external: true
