version: '3.9'

services:
  mongodb:
    image: mongo:8.3
    container_name: job-search-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: job_search
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:8.6.3-alpine
    container_name: job-search-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
