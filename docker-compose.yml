version: '3.9'

services:
  mongodb:
    image: mongo:8.3
    container_name: job-search-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: job_search
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.8.0-alpine
    container_name: job-search-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: job-search-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/job_search
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api:/app/packages/api
      - ./packages/shared:/app/packages/shared

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    container_name: job-search-crawler
    ports:
      - "8000:8000"
    environment:
      API_URL: http://api:3000
    depends_on:
      - api
    volumes:
      - ./crawler:/app/crawler

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: job-search-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - api
    volumes:
      - ./packages/frontend:/app/packages/frontend
      - ./packages/shared:/app/packages/shared

volumes:
  mongo_data:
  redis_data:
