name: Release Please Automerge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - labeled

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: "${{ contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}"
    steps:
      - name: Wait for checks to pass
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr checks "$PR_URL" --watch --interval 30

      - name: Automerge Release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Use 'gh' CLI to merge the PR.
          # Using a PAT secret instead of GITHUB_TOKEN to ensure subsequent
          # workflows (tagging/releasing) are triggered.
          gh pr merge "$PR_URL" --auto --merge
