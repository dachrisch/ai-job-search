name: CI

on:
  push:
    branches: [master, main]
    tags-ignore:
      - "v*"
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Tests & Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build
        working-directory: packages/shared

      - name: Run API tests
        run: npm test -- --run
        working-directory: packages/api
        env:
          CI: 'true'
          MONGODB_URI: 'mongodb://localhost:27017/job_search_test'
          REDIS_URL: 'redis://localhost:6379'

      - name: Build Frontend
        run: npm run build
        working-directory: packages/frontend

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build
        working-directory: packages/shared

      - name: Build Frontend
        run: npm run build
        working-directory: packages/frontend

  docker-image-api:
    needs: [test, lint]
    uses: ./.github/workflows/part_docker_build.yaml
    with:
      dockerfile: packages/api/Dockerfile
      image_name: job-search-api
      pre_build_command: |
        npm install
        npm run build --workspace=@job-search/shared
        npx esbuild packages/api/src/index.ts --bundle --platform=node --target=node20 --format=esm --outfile=packages/api/dist/index.js --packages=external

  docker-image-frontend:
    needs: [test, lint]
    uses: ./.github/workflows/part_docker_build.yaml
    with:
      dockerfile: packages/frontend/Dockerfile
      image_name: job-search-frontend

  docker-image-crawler:
    needs: [test, lint]
    uses: ./.github/workflows/part_docker_build.yaml
    with:
      dockerfile: crawler/Dockerfile
      image_name: job-search-crawler

  image-test-api:
    needs: [docker-image-api]
    uses: ./.github/workflows/part_docker_test.yaml
    with:
      artifact_name: ${{ needs.docker-image-api.outputs.artifact_name }}
      image_name: job-search-api
      env_vars: >-
        -e MONGODB_URI=mongodb://host.docker.internal:27017/test
        -e REDIS_URL=redis://host.docker.internal:6379
        -e CLAUDE_API_KEY=ci-dummy
        -e JWT_SECRET=ci-test-secret

  image-test-frontend:
    needs: [docker-image-frontend]
    uses: ./.github/workflows/part_docker_test.yaml
    with:
      artifact_name: ${{ needs.docker-image-frontend.outputs.artifact_name }}
      image_name: job-search-frontend

  image-test-crawler:
    needs: [docker-image-crawler]
    uses: ./.github/workflows/part_docker_test.yaml
    with:
      artifact_name: ${{ needs.docker-image-crawler.outputs.artifact_name }}
      image_name: job-search-crawler

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [test, lint, image-test-api, image-test-frontend, image-test-crawler]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.image-test-api.result }}" = "failure" ] || \
             [ "${{ needs.image-test-frontend.result }}" = "failure" ] || \
             [ "${{ needs.image-test-crawler.result }}" = "failure" ]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ CI passed"
          fi
