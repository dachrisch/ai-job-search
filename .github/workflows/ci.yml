name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Tests & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build
        working-directory: packages/shared

      - name: Run API tests
        run: npm test -- --run
        working-directory: packages/api
        env:
          CI: 'true'
          MONGODB_URI: 'mongodb://localhost:27017/job_search_test'
          REDIS_URL: 'redis://localhost:6379'

      - name: Build API TypeScript
        run: npm run build
        working-directory: packages/api
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Build Frontend
        run: npm run build
        working-directory: packages/frontend

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build
        working-directory: packages/shared

      - name: Check TypeScript (API)
        run: npm run build
        working-directory: packages/api
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Check TypeScript (Frontend)
        run: npm run build
        working-directory: packages/frontend

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ CI passed"
          fi
